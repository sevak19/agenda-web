services:
  postgres:
    image: postgres:15
    container_name: agenda_web_db

    environment:
      POSTGRES_DB: agenda_web
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agenda_web"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
