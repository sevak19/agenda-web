name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'frontend/**'
    branches:
      - main
      - develop

jobs:
  build:
    name: Build e Type-check do Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔎 Lint
        run: npm run lint

      - name: 🏗️ Build (type-check + Vite)
        run: npm run build
